services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: StudentCabinet
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/StudentCabinet
      FLASK_SECRET_KEY: change-me-on-server
      ADMIN_EMAIL: admin@vyatsu.ru
      ADMIN_PASSWORD: admin123
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
