<div id="event-modal" class="modal-overlay">
    <div class="modal-box event-modal-box">
        <button type="button" class="modal-close" id="event-modal-close" aria-label="Закрыть">&times;</button>
        <div class="event-modal-header">
            <h3 id="event-modal-title">Событие</h3>
            <button type="button" class="event-modal-edit-btn" id="event-modal-edit-btn" hidden title="Редактировать">✎</button>
        </div>
        <p id="event-modal-time" class="hint"></p>
        <p id="event-modal-extra" class="hint"></p>

        <div id="event-modal-view-panel">
            <div id="event-modal-slot-info" class="event-modal-slot-info" hidden></div>
            <div id="event-modal-queue-wrap" hidden>
                <h4>Очередь</h4>
                <ul id="event-modal-queue-list"></ul>
            </div>
            <div id="event-modal-submissions-wrap" hidden>
                <h4>Сданные работы</h4>
                <ul id="event-modal-submissions-list"></ul>
            </div>
        </div>

        <div class="form-group event-modal-note-block">
            <label>Моя заметка</label>
            <p id="event-modal-note-hint" class="hint">Личная заметка — видна только вам.</p>
            <textarea id="event-modal-note" rows="3" placeholder="Комментарий к событию"></textarea>
            <input type="file" id="event-modal-my-file" style="margin-top:0.5rem;">
            <div style="display:flex; gap:0.5rem; margin-top:0.5rem; flex-wrap:wrap;">
                <button type="button" id="event-modal-save-note" class="btn btn-primary">Сохранить</button>
                <button type="button" id="event-modal-delete-note" class="btn btn-outline">Удалить заметку</button>
            </div>
        </div>

        <div id="event-modal-teacher-files-wrap">
            <h4>Материалы преподавателя</h4>
            <ul id="event-modal-teacher-files"></ul>
            <p id="event-modal-teacher-files-empty" class="hint">Нет файлов от преподавателя</p>
        </div>

        <div id="event-modal-my-files-wrap">
            <h4>Мои файлы</h4>
            <ul id="event-modal-my-files"></ul>
        </div>

        <div id="event-modal-student-submission-wrap" style="display:none;">
            <h4>Сдать работу</h4>
            <input type="file" id="event-modal-submission-file">
            <button type="button" id="event-modal-submission-upload" class="btn btn-outline" style="margin-top:0.5rem;">Загрузить</button>
            <ul id="event-modal-my-submission"></ul>
        </div>

        <div id="event-modal-queue-actions" style="display:none;">
            <button type="button" id="event-modal-join-queue" class="btn btn-accent btn-block">Встать в очередь</button>
            <button type="button" id="event-modal-leave-queue" class="btn btn-outline btn-block" hidden>Выйти из очереди</button>
        </div>

        <div id="event-modal-slot-edit" style="display:none;">
            <h4>Редактирование слота</h4>
            <div class="form-group"><label>Дата</label><input type="date" id="ev-slot-date"></div>
            <div class="form-group"><label>Начало</label><input type="time" id="ev-slot-start"></div>
            <div class="form-group"><label>Конец</label><input type="time" id="ev-slot-end"></div>
            <div class="form-group"><label>Кабинет</label><input type="text" id="ev-slot-room" data-room-mask></div>
            <div class="form-group"><label>Тема</label><input type="text" id="ev-slot-topic"></div>
            <div class="form-group"><label>Макс. студентов</label><input type="number" id="ev-slot-max" min="1"></div>
            <div class="form-group">
                <label><input type="checkbox" id="ev-slot-enable-queue"> Очередь на паре</label>
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="ev-slot-enable-submission"> Сдача работ</label>
            </div>
            <div class="event-modal-slot-actions">
                <button type="button" id="ev-slot-save" class="btn btn-primary btn-block">Сохранить слот</button>
                <button type="button" id="ev-slot-delete" class="btn btn-danger btn-block">Удалить слот</button>
            </div>
        </div>

        <div id="event-modal-lesson-edit" style="display:none;">
            <h4>Материалы к паре</h4>
            <input type="file" id="event-modal-lesson-file">
            <button type="button" id="event-modal-lesson-upload-btn" class="btn btn-outline" style="margin-top:0.5rem;">Прикрепить для студентов</button>
        </div>

        <div id="event-modal-slot-materials-edit" style="display:none;">
            <h4>Файлы для студентов</h4>
            <input type="file" id="event-modal-file">
            <button type="button" id="event-modal-upload-btn" class="btn btn-outline" style="margin-top:0.5rem;">Прикрепить для студентов</button>
        </div>

        <div id="event-modal-booking-actions" style="display:none;">
            <button type="button" id="event-modal-cancel-booking" class="btn btn-danger">Отменить запись</button>
        </div>
    </div>
</div>
