<div id="event-modal" class="modal-overlay">
    <div class="modal-box event-modal-box">
        <button type="button" class="modal-close" id="event-modal-close" aria-label="Закрыть">&times;</button>
        <h3 id="event-modal-title">Событие</h3>
        <p id="event-modal-time" class="hint"></p>
        <p id="event-modal-extra" class="hint"></p>

        <div class="form-group">
            <label>Моя заметка</label>
            <textarea id="event-modal-note" rows="3" placeholder="Комментарий к событию"></textarea>
            <button type="button" id="event-modal-save-note" class="btn btn-outline" style="margin-top:0.5rem;">Сохранить заметку</button>
        </div>

        <div id="event-modal-teacher-files-wrap">
            <h4>Материалы преподавателя</h4>
            <ul id="event-modal-teacher-files"></ul>
            <p id="event-modal-teacher-files-empty" class="hint">Нет файлов от преподавателя</p>
        </div>

        <div id="event-modal-my-files-wrap">
            <h4>Мои файлы</h4>
            <ul id="event-modal-my-files"></ul>
            <div id="event-modal-my-upload">
                <input type="file" id="event-modal-my-file">
                <button type="button" id="event-modal-my-upload-btn" class="btn btn-outline" style="margin-top:0.5rem;">Прикрепить файл</button>
            </div>
        </div>

        <div id="event-modal-slot-edit" style="display:none;">
            <h4>Редактирование слота приёма</h4>
            <div class="form-group"><label>Дата</label><input type="date" id="ev-slot-date"></div>
            <div class="form-group"><label>Начало</label><input type="time" id="ev-slot-start"></div>
            <div class="form-group"><label>Конец</label><input type="time" id="ev-slot-end"></div>
            <div class="form-group"><label>Кабинет</label><input type="text" id="ev-slot-room" data-room-mask></div>
            <div class="form-group"><label>Тема</label><input type="text" id="ev-slot-topic"></div>
            <div class="form-group"><label>Макс. студентов</label><input type="number" id="ev-slot-max" min="1"></div>
            <button type="button" id="ev-slot-save" class="btn btn-outline">Сохранить слот</button>
            <button type="button" id="ev-slot-delete" class="btn-danger">Удалить слот</button>
        </div>

        <div id="event-modal-teacher-upload-wrap" style="display:none;">
            <h4>Файлы для студентов</h4>
            <input type="file" id="event-modal-file">
            <button type="button" id="event-modal-upload-btn" class="btn btn-outline" style="margin-top:0.5rem;">Прикрепить для студентов</button>
        </div>
    </div>
</div>
